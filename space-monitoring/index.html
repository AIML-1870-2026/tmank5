<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEO // MISSION CONTROL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0c0f;
      --bg2:     #111418;
      --bg3:     #181c22;
      --border:  #1e2530;
      --accent:  #00d4ff;
      --accent2: #ff6b35;
      --text:    #e2e8f0;
      --muted:   #4a5568;
      --muted2:  #718096;
      --danger:  #ff4444;
      --warn:    #ffaa00;
      --safe:    #00cc88;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
    }

    /* ── TOP BAR ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      z-index: 10;
    }

    #wordmark {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    #clock {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted2);
      flex: 1;
      text-align: center;
    }

    .stat-pills { display: flex; gap: 8px; }

    .stat-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--bg);
      color: var(--muted2);
      white-space: nowrap;
    }

    .stat-pill .val { color: var(--accent); font-weight: 600; }

    #refresh-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.12s, color 0.12s;
    }

    #refresh-btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── MAIN GRID ── */
    #main {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 160px;
      background: var(--border);
      gap: 1px;
    }

    .panel {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    #panel3 { grid-column: 1 / -1; }

    /* ── PANEL HEADER ── */
    .ph {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .ph-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    .sort-group { display: flex; gap: 4px; }

    .sort-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.1s, color 0.1s;
    }

    .sort-btn:hover, .sort-btn.active { border-color: var(--accent); color: var(--accent); }

    #size-subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted2);
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── PANEL BODY ── */
    .pb {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
    }

    .pb::-webkit-scrollbar { width: 3px; }
    .pb::-webkit-scrollbar-track { background: var(--bg); }
    .pb::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── TABLE ── */
    table { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }

    thead th {
      position: sticky; top: 0;
      background: var(--bg2);
      padding: 6px 10px;
      text-align: left;
      font-size: 9px; font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      z-index: 1;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.08s;
    }

    tbody tr:hover { background: var(--bg3); }

    tbody tr.selected {
      border-left: 3px solid var(--accent);
      background: rgba(0, 212, 255, 0.04);
    }

    tbody td { padding: 6px 10px; color: var(--text); white-space: nowrap; }

    .c-name { color: var(--accent); max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
    .c-close { color: var(--safe); }
    .c-mid   { color: var(--warn); }
    .c-vel   { color: var(--warn); }

    /* ── SENTRY ROWS ── */
    .sr {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      transition: background 0.08s;
    }

    .sr:hover { background: var(--bg3); }

    .sr.highlighted {
      border-left: 3px solid var(--accent2);
      background: rgba(255, 107, 53, 0.05);
    }

    .sr-name {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sr-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      font-size: 10px;
      color: var(--muted2);
    }

    .ps-safe   { color: var(--safe); }
    .ps-warn   { color: var(--warn); }
    .ps-danger { color: var(--danger); }

    .ts-badge {
      display: inline-block;
      padding: 1px 5px;
      background: var(--border);
      border-radius: 2px;
      color: var(--muted2);
    }

    /* ── STATUS MESSAGES ── */
    .sm {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 60px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 20px;
      text-align: center;
    }

    .sm.err { color: var(--danger); }

    /* ── NO SENTRY NOTICE ── */
    #no-sentry {
      display: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.08em;
      padding: 5px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }

    /* ── SIZE PANEL ── */
    #pb3 { overflow: hidden; }

    #size-svg-wrap { width: 100%; height: 100%; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="wordmark">NEO // MISSION CONTROL</div>
  <div id="clock">——</div>
  <div class="stat-pills">
    <div class="stat-pill">OBJECTS <span class="val" id="s-obj">—</span></div>
    <div class="stat-pill">PHAs <span class="val" id="s-pha">—</span></div>
    <div class="stat-pill">SENTRY <span class="val" id="s-sen">—</span></div>
  </div>
  <button id="refresh-btn">REFRESH</button>
</div>

<!-- MAIN GRID -->
<div id="main">

  <!-- PANEL 1: CLOSE APPROACH FEED -->
  <div class="panel" id="panel1">
    <div class="ph">
      <span class="ph-title">CLOSE APPROACH FEED</span>
      <div class="sort-group">
        <button class="sort-btn active" data-sort="date">DATE</button>
        <button class="sort-btn" data-sort="dist">DISTANCE</button>
        <button class="sort-btn" data-sort="vel">VELOCITY</button>
      </div>
    </div>
    <div class="pb" id="pb1"><div class="sm">FETCHING DATA...</div></div>
  </div>

  <!-- PANEL 2: IMPACT RISK BOARD -->
  <div class="panel" id="panel2">
    <div class="ph"><span class="ph-title">IMPACT RISK BOARD</span></div>
    <div id="no-sentry">NO SENTRY ENTRY FOR SELECTED OBJECT</div>
    <div class="pb" id="pb2"><div class="sm">FETCHING DATA...</div></div>
  </div>

  <!-- PANEL 3: SIZE COMPARISON -->
  <div class="panel" id="panel3">
    <div class="ph">
      <span class="ph-title">SIZE COMPARISON</span>
      <span id="size-subtitle"></span>
    </div>
    <div class="pb" id="pb3"><div class="sm">LOADING...</div></div>
  </div>

</div>

<script>
(() => {
  // ── State ────────────────────────────────────────────────────────────────
  let cadRaw    = [];   // raw rows from CAD API
  let cadFields = {};   // field name → array index
  let cadSorted = [];   // current sorted view
  let sentryList = [];  // all sentry objects
  let sentryMap  = {};  // normalized des → sentry object
  let sortKey = 'date';
  let selDes  = null;   // selected object designation (normalized)

  // ── Clock ────────────────────────────────────────────────────────────────
  const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const pad = v => String(v).padStart(2, '0');

  function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
      `${DAYS[n.getUTCDay()]} ${pad(n.getUTCDate())} ${MONTHS[n.getUTCMonth()]} ${n.getUTCFullYear()}` +
      `  ${pad(n.getUTCHours())}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())} UTC`;
  }
  setInterval(tick, 1000);
  tick();

  // ── API URLs ─────────────────────────────────────────────────────────────
  const LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const PROXY = 'https://corsproxy.io/?url=';
  const CAD_JPL = 'https://ssd-api.jpl.nasa.gov/cad.api?date-min=now&date-max=%2B30&dist-max=0.05&neo=true&fullname=true&diameter=true';
  const SEN_JPL = 'https://ssd-api.jpl.nasa.gov/sentry.api';
  const CAD_URL = LOCAL ? '/api/cad' : PROXY + encodeURIComponent(CAD_JPL);
  const SEN_URL = LOCAL ? '/api/sentry' : PROXY + encodeURIComponent(SEN_JPL);

  // ── Load ─────────────────────────────────────────────────────────────────
  async function loadAll() {
    const btn = document.getElementById('refresh-btn');
    btn.textContent = 'REFRESHING...';
    btn.disabled = true;

    // Reset state
    cadRaw = []; cadFields = {}; cadSorted = [];
    sentryList = []; sentryMap = {};
    selDes = null;
    document.getElementById('no-sentry').style.display = 'none';
    document.getElementById('size-subtitle').textContent = '';

    setPB('pb1', 'FETCHING DATA...');
    setPB('pb2', 'FETCHING DATA...');
    setPB('pb3', 'LOADING...');

    let cadOk = false, senOk = false;

    function errMsg(e, status) {
      if (e && (e.message || '').toLowerCase().includes('failed to fetch'))
        return 'CORS BLOCKED — OPEN VIA LIVE SERVER, NOT file://';
      if (status) return `HTTP ${status} — CHECK CONSOLE`;
      return e ? e.message.toUpperCase().slice(0, 60) : 'UNKNOWN ERROR';
    }

    // Fetch CAD and Sentry independently so one failure doesn't mask the other
    const [cadResult, senResult] = await Promise.allSettled([
      fetch(CAD_URL),
      fetch(SEN_URL)
    ]);

    // Parse CAD
    if (cadResult.status === 'fulfilled' && cadResult.value.ok) {
      try {
        const j = await cadResult.value.json();
        if (j && j.fields && j.data) {
          j.fields.forEach((name, i) => { cadFields[name] = i; });
          cadRaw = j.data;
          cadOk = true;
        } else {
          setPB('pb1', 'UNEXPECTED API RESPONSE — CHECK CONSOLE', true);
          console.error('CAD response:', j);
        }
      } catch (e) { setPB('pb1', errMsg(e, null), true); console.error(e); }
    } else {
      const e   = cadResult.reason;
      const res = cadResult.value;
      setPB('pb1', errMsg(e, res && res.status), true);
      console.error('CAD fetch failed:', e || res.status);
    }

    // Parse Sentry
    if (senResult.status === 'fulfilled' && senResult.value.ok) {
      try {
        const j = await senResult.value.json();
        if (j && j.data) {
          sentryList = j.data;
          sentryList.forEach(o => { sentryMap[norm(o.des || '')] = o; });
          senOk = true;
        } else {
          setPB('pb2', 'UNEXPECTED API RESPONSE — CHECK CONSOLE', true);
          console.error('Sentry response:', j);
        }
      } catch (e) { setPB('pb2', errMsg(e, null), true); console.error(e); }
    } else {
      const e   = senResult.reason;
      const res = senResult.value;
      setPB('pb2', errMsg(e, res && res.status), true);
      console.error('Sentry fetch failed:', e || res.status);
    }

    updateStats();
    if (cadOk) renderCAD();
    if (senOk) renderSentry();
    renderSize(defaultObj());

    btn.textContent = 'REFRESH';
    btn.disabled = false;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  const norm = s => String(s).trim().toLowerCase();

  function fv(row, name)  { return row[cadFields[name]]; }
  function fn(row, name)  { const v = parseFloat(fv(row, name)); return isNaN(v) ? null : v; }

  function setPB(id, msg, err = false) {
    document.getElementById(id).innerHTML =
      `<div class="sm${err ? ' err' : ''}">${msg}</div>`;
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function updateStats() {
    const phas = cadRaw.filter(r => { const h = fn(r,'h'); return h !== null && h <= 22; }).length;
    document.getElementById('s-obj').textContent = cadRaw.length;
    document.getElementById('s-pha').textContent = phas;
    document.getElementById('s-sen').textContent = sentryList.length;
  }

  // ── CAD Table ─────────────────────────────────────────────────────────────
  function applySort(data) {
    const d = [...data];
    if (sortKey === 'date') d.sort((a,b) => new Date(fv(a,'cd')) - new Date(fv(b,'cd')));
    if (sortKey === 'dist') d.sort((a,b) => (fn(a,'dist') ?? 9) - (fn(b,'dist') ?? 9));
    if (sortKey === 'vel')  d.sort((a,b) => (fn(b,'v_rel') ?? 0) - (fn(a,'v_rel') ?? 0));
    return d;
  }

  function renderCAD() {
    if (!cadRaw.length) { setPB('pb1', 'NO OBJECTS MATCHING CRITERIA'); return; }

    cadSorted = applySort(cadRaw);

    let h = `<table>
      <thead><tr>
        <th>OBJECT</th><th>DATE (UTC)</th><th>DIST (AU)</th>
        <th>MISS DIST (AU)</th><th>VEL (km/s)</th><th>H MAG</th><th>DIAM (km)</th>
      </tr></thead><tbody>`;

    cadSorted.forEach((row, i) => {
      const name = norm(fv(row,'fullname') || fv(row,'des') || '?');
      const disp = name.length > 22 ? name.slice(0,22)+'…' : name;
      const cd   = (fv(row,'cd') || '—').trim();
      const dist = fn(row,'dist');
      const dmin = fn(row,'dist_min');
      const vel  = fn(row,'v_rel');
      const hmag = fv(row,'h') || '—';
      const diam = fn(row,'diameter');
      const des  = norm(fv(row,'des') || '');

      const dc  = dist !== null ? (dist < 0.01 ? 'c-close' : dist < 0.03 ? 'c-mid' : '') : '';
      const sel = des && des === selDes ? ' selected' : '';

      h += `<tr class="${sel}" data-i="${i}" data-des="${des}">
        <td class="c-name" title="${name}">${disp}</td>
        <td>${cd}</td>
        <td class="${dc}">${dist !== null ? dist.toFixed(5) : '—'}</td>
        <td>${dmin !== null ? dmin.toFixed(5) : '—'}</td>
        <td class="c-vel">${vel !== null ? vel.toFixed(2) : '—'}</td>
        <td>${hmag}</td>
        <td>${diam !== null ? diam.toFixed(3) : '—'}</td>
      </tr>`;
    });

    h += '</tbody></table>';
    const pb = document.getElementById('pb1');
    pb.innerHTML = h;

    pb.querySelectorAll('tbody tr').forEach(tr => {
      tr.addEventListener('click', () => onRowClick(tr));
    });
  }

  function onRowClick(tr) {
    document.querySelectorAll('#pb1 tbody tr.selected').forEach(r => r.classList.remove('selected'));
    tr.classList.add('selected');
    selDes = tr.dataset.des;

    const row = cadSorted[parseInt(tr.dataset.i)];
    highlightSentry(sentryMap[selDes] || fuzzyMatch(selDes));
    renderSize(row);
  }

  function fuzzyMatch(des) {
    const stripped = des.replace(/[^0-9a-z]/g, '');
    for (const [k, v] of Object.entries(sentryMap)) {
      if (k.replace(/[^0-9a-z]/g, '') === stripped) return v;
    }
    return null;
  }

  // ── Sentry Board ──────────────────────────────────────────────────────────
  function renderSentry() {
    if (!sentryList.length) { setPB('pb2', 'NO OBJECTS ON SENTRY LIST'); return; }

    const sorted = [...sentryList].sort((a,b) =>
      (parseFloat(b.ip) || 0) - (parseFloat(a.ip) || 0)
    );

    let h = '';
    sorted.forEach(o => {
      const name  = (o.fullname || o.des || '?').trim();
      const ip    = fmtIP(o.ip);
      const ps    = parseFloat(o.ps_cum);
      const psCls = isNaN(ps) ? '' : ps < -2 ? 'ps-safe' : ps <= 0 ? 'ps-warn' : 'ps-danger';
      const psStr = isNaN(ps) ? '—' : ps.toFixed(2);
      const ts    = o.ts_max !== undefined ? parseInt(o.ts_max) : '—';
      const rng   = o.range || '—';
      const diam  = o.diameter ? parseFloat(o.diameter).toFixed(3)+' km' : '—';
      const des   = norm(o.des || '');

      h += `<div class="sr" data-des="${des}">
        <div class="sr-name" title="${name}">${name}</div>
        <div class="sr-meta">
          <span>IP: ${ip}</span>
          <span class="${psCls}">PALERMO: ${psStr}</span>
          <span>TORINO: <span class="ts-badge">${ts}</span></span>
          <span>RANGE: ${rng}</span>
          <span>DIAM: ${diam}</span>
        </div>
      </div>`;
    });

    document.getElementById('pb2').innerHTML = h;
  }

  function fmtIP(ip) {
    const p = parseFloat(ip);
    if (!ip || isNaN(p) || p <= 0) return '—';
    return `1 in ${Math.round(1/p).toLocaleString()}`;
  }

  function highlightSentry(obj) {
    const nl = document.getElementById('no-sentry');
    document.querySelectorAll('.sr.highlighted').forEach(r => r.classList.remove('highlighted'));

    if (!obj) { nl.style.display = 'block'; return; }
    nl.style.display = 'none';

    const row = document.querySelector(`.sr[data-des="${norm(obj.des || '')}"]`);
    if (row) {
      row.classList.add('highlighted');
      row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  // ── Size Comparison ───────────────────────────────────────────────────────
  const LANDMARKS = [
    { label: 'FOOTBALL\nFIELD',   m: 91 },
    { label: 'EIFFEL\nTOWER',     m: 330 },
    { label: 'EMPIRE\nSTATE',     m: 443 },
    { label: 'GOLDEN\nGATE SPAN', m: 1280 },
    { label: 'MANHATTAN\nISLAND', m: 21000 },
  ];

  // Estimate diameter from H magnitude (albedo 0.15, standard NEO formula)
  function estimateDiamKm(row) {
    const h = fn(row, 'h');
    if (h === null) return null;
    return 1329 * Math.pow(10, -h / 5) / Math.sqrt(0.15);
  }

  function defaultObj() {
    if (!cadRaw.length) return null;
    // Prefer objects with real diameter data; fall back to first object
    const withDiam = cadRaw.find(r => fn(r,'diameter') !== null);
    return withDiam || cadRaw[0];
  }

  function renderSize(row) {
    const pb  = document.getElementById('pb3');
    const sub = document.getElementById('size-subtitle');

    if (!row) { setPB('pb3', 'NO DATA'); sub.textContent = ''; return; }

    const rawName = fv(row,'fullname') || fv(row,'des') || '?';
    const name    = rawName.trim();
    let diamKm    = fn(row,'diameter');
    let estimated = false;

    if (diamKm === null || diamKm <= 0) {
      diamKm    = estimateDiamKm(row);
      estimated = true;
    }

    if (diamKm === null || diamKm <= 0) {
      setPB('pb3', 'DIAMETER UNKNOWN — NO OPTICAL DATA');
      sub.textContent = name;
      return;
    }

    const diamM = diamKm * 1000;
    const label = diamM < 1000 ? diamM.toFixed(0)+' m' : diamKm.toFixed(3)+' km';
    sub.textContent = `${name} — ${label}${estimated ? '  (EST. FROM H MAG)' : ''}`;

    pb.innerHTML = '';
    requestAnimationFrame(() => drawSVG(pb, diamM, name, estimated));
  }

  function drawSVG(container, asteroidM, name, estimated) {
    const W  = container.clientWidth  || 800;
    const H  = Math.max(container.clientHeight || 0, 90);
    const PL = 55, PR = 55;
    const UW = W - PL - PR;
    const BASE = Math.floor(H * 0.72);

    const LOG_MIN = Math.log10(10);
    const LOG_MAX = Math.log10(50000);

    const xp = m =>
      PL + ((Math.log10(Math.max(m, 10)) - LOG_MIN) / (LOG_MAX - LOG_MIN)) * UW;

    const MAX_R = Math.max(Math.min(BASE - 22, 30), 6);
    const MIN_R = 3;

    const cr = m =>
      MIN_R + ((Math.log10(Math.max(m, 10)) - LOG_MIN) / (LOG_MAX - LOG_MIN)) * (MAX_R - MIN_R);

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;

    // Baseline
    svg += `<line x1="${PL}" y1="${BASE}" x2="${W-PR}" y2="${BASE}" stroke="#1e2530" stroke-width="1"/>`;

    // Scale ticks
    [10, 100, 1000, 10000, 50000].forEach(m => {
      const x   = xp(m);
      const lbl = m >= 1000 ? (m/1000)+'km' : m+'m';
      svg += `<line x1="${x}" y1="${BASE-3}" x2="${x}" y2="${BASE+3}" stroke="#1e2530" stroke-width="1"/>
              <text x="${x}" y="${BASE+13}" font-family="IBM Plex Mono,monospace" font-size="7"
                fill="#4a5568" text-anchor="middle">${lbl}</text>`;
    });

    // Landmark circles
    LANDMARKS.forEach(lm => {
      const x     = xp(lm.m);
      const r     = cr(lm.m);
      const lines = lm.label.split('\n');
      svg += `<circle cx="${x}" cy="${BASE}" r="${r}" fill="none" stroke="#1e2530" stroke-width="1"/>`;
      lines.forEach((ln, li) => {
        const ty = BASE - r - 5 - (lines.length - 1 - li) * 9;
        svg += `<text x="${x}" y="${ty}" font-family="IBM Plex Mono,monospace" font-size="7"
          fill="#4a5568" text-anchor="middle">${ln}</text>`;
      });
    });

    // Asteroid
    const ax = xp(asteroidM);
    const ar = cr(asteroidM);
    const short   = name.length > 26 ? name.slice(0,26)+'…' : name;
    const diamStr = asteroidM < 1000 ? `${asteroidM.toFixed(0)} m` : `${(asteroidM/1000).toFixed(3)} km`;

    // Keep labels inside the SVG viewport
    const textY1 = Math.max(10, BASE - ar - 6);
    const textY2 = Math.max(10, BASE - ar - 17);
    const estTag = estimated ? ' ~' : '';

    svg += `<circle cx="${ax}" cy="${BASE}" r="${ar}"
              fill="rgba(0,212,255,0.12)" stroke="#00d4ff" stroke-width="1.5"/>
            <text x="${ax}" y="${textY1}" font-family="IBM Plex Mono,monospace" font-size="9"
              fill="#00d4ff" text-anchor="middle" font-weight="500">${short}</text>
            <text x="${ax}" y="${textY2}" font-family="IBM Plex Mono,monospace" font-size="8"
              fill="#00d4ff" text-anchor="middle">${diamStr}${estTag}</text>`;

    svg += '</svg>';
    container.innerHTML = svg;
  }

  // ── Sort Buttons ──────────────────────────────────────────────────────────
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sortKey = btn.dataset.sort;
      renderCAD();
    });
  });

  // ── Refresh ───────────────────────────────────────────────────────────────
  document.getElementById('refresh-btn').addEventListener('click', loadAll);

  // ── Boot ──────────────────────────────────────────────────────────────────
  loadAll();
})();
</script>
</body>
</html>
